<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chytač kvapiek</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; touch-action: none; }
        #game-container { 
            position: relative; width: 100vw; height: 100vh; 
            background: url('https://images.unsplash.com/photo-1438449805896-28a666819a20?auto=format&fit=crop&q=80&w=1080') center/cover;
        }
        #bucket { 
            position: absolute; bottom: 20px; width: 80px; height: 100px; 
            background: url('https://cdn-icons-png.flaticon.com/512/4241/4241459.png') no-repeat center/contain;
            left: 50%; transform: translateX(-50%);
        }
        .drop { position: absolute; width: 30px; height: 45px; background-size: contain; background-repeat: no-repeat; }
        .blue-drop { background-image: url('https://cdn-icons-png.flaticon.com/512/3144/3144468.png'); }
        .green-drop { background-image: url('https://cdn-icons-png.flaticon.com/512/3144/3144502.png'); filter: hue-rotate(90deg); }
        #ui { position: absolute; top: 10px; left: 10px; font-size: 18px; color: white; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        #game-over { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 30px; border-radius: 15px; text-align: center; width: 80%; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="ui">Skóre: <span id="score">0</span> | Čas: <span id="timer">60</span>s</div>
    <div id="bucket"></div>
    <div id="game-over">
        <h2>Koniec hry!</h2>
        <p id="final-score"></p>
        <button onclick="location.reload()" style="padding: 10px 20px;">Hrať znova</button>
    </div>
</div>
<script>
    const bucket = document.getElementById('bucket');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    let score = 0, timeLeft = 60, active = true;

    // Ovládanie dotykom (pre mobil)
    window.addEventListener('touchmove', (e) => {
        if(!active) return;
        let touchX = e.touches[0].clientX;
        let x = touchX - bucket.offsetWidth / 2;
        x = Math.max(0, Math.min(x, window.innerWidth - bucket.offsetWidth));
        bucket.style.left = x + 'px';
    });

    function createDrop() {
        if(!active) return;
        const drop = document.createElement('div');
        const isGreen = Math.random() > 0.8;
        drop.className = 'drop ' + (isGreen ? 'green-drop' : 'blue-drop');
        drop.style.left = Math.random() * (window.innerWidth - 30) + 'px';
        drop.style.top = '-50px';
        document.getElementById('game-container').appendChild(drop);
        let pos = -50;
        function fall() {
            if(!active) { drop.remove(); return; }
            pos += 5; drop.style.top = pos + 'px';
            const d = drop.getBoundingClientRect(), b = bucket.getBoundingClientRect();
            if(d.bottom >= b.top && d.right >= b.left && d.left <= b.right && d.top <= b.bottom) {
                score += isGreen ? -5 : 10; scoreEl.innerText = score; drop.remove(); return;
            }
            if(pos > window.innerHeight) drop.remove(); else requestAnimationFrame(fall);
        }
        requestAnimationFrame(fall);
    }
    const dInt = setInterval(createDrop, 400);
    const tInt = setInterval(() => {
        timeLeft--; timerEl.innerText = timeLeft;
        if(timeLeft <= 0) {
            active = false; clearInterval(dInt); clearInterval(tInt);
            document.getElementById('final-score').innerText = "Skóre: " + score;
            document.getElementById('game-over').style.display = 'block';
        }
    }, 1000);
</script>
</body>
</html>
